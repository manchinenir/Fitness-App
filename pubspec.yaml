name: flex_facility_app
description: A gym management app for admins and clients.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Networking & utilities
  http: ^0.13.5
  provider: ^6.1.2
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  uuid: ^4.2.2
  rxdart: ^0.27.7
  timezone: ^0.9.2

  # Firebase
  firebase_core: ^3.13.1
  firebase_auth: ^5.5.4
  cloud_firestore: ^5.6.8
  cloud_functions: ^5.5.1
  firebase_storage: ^12.4.6

  # UI and visuals
  font_awesome_flutter: ^10.7.0
  table_calendar: ^3.0.9
  fluttertoast: ^8.2.4
  url_launcher: ^6.2.5
  share_plus: ^7.2.1
  fl_chart: ^0.63.0
  percent_indicator: ^4.2.2

  # File & media
  image_picker: ^1.0.4
  file_picker: ^10.2.0
  csv: ^5.0.1
  path_provider: ^2.0.11

  # PDF generation & opening
  pdf: ^3.10.6
  printing: ^5.11.0
  open_file: ^3.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.5

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.webp
    - assets/images/chest.png  # ✅ Correctly added path

flutter_native_splash:
  color: "#1C2D5E"
  image: assets/splash_logo.png
  android: true
  ios: true
  fullscreen: true

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
