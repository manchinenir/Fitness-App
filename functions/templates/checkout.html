<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Secure Payment</title>
  <script src="https://web.squarecdn.com/v1/square.js"></script>
  <style>
    :root{
      --primary:#1C2D5E;--primary-dark:#152347;--primary-light:#2a3f7a;
      --success:#0a6;--error:#d32f2f;--text:#333;--text-light:#666;
      --background:#f5f7fb;--surface:#fff;--border:#e7e9ef;--shadow:0 10px 30px rgba(0,0,0,.08)
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,Cantarell,sans-serif;background:var(--background);color:var(--text);line-height:1.6;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .container{max-width:560px;width:100%}
    .card{background:var(--surface);border-radius:20px;padding:28px;box-shadow:var(--shadow);border:1px solid var(--border)}
    .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
    .brand{display:flex;gap:10px;align-items:center}
    .logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--primary),var(--primary-light))}
    .title{font-weight:800;font-size:18px;color:var(--primary)}
    .price-badge{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;padding:10px 14px;border-radius:12px;font-weight:700}
    .section{margin-top:18px}
    .section h3{font-size:14px;color:var(--primary);letter-spacing:.4px;margin-bottom:10px}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .input{display:flex;flex-direction:column;gap:8px}
    .input label{font-size:12px;color:#57607a}
    .input input{padding:12px 12px;border:1px solid var(--border);border-radius:12px;font-size:14px;outline:none;background:#fbfcff}
    .input input:focus{border-color:var(--primary);box-shadow:0 0 0 4px rgba(28,45,94,.10)}
    #card-container{border:1.5px dashed var(--border);border-radius:14px;padding:14px;background:#fff;min-height:62px;display:flex;align-items:center}
    .btn{width:100%;padding:14px 16px;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-top:14px;background:var(--primary);color:#fff}
    .btn.secondary{background:#000;color:#fff}
    .btn:disabled{opacity:.6;cursor:not-allowed}
    .sub{font-size:12px;color:#6c7590;margin-top:6px}
    .message{border-radius:12px;padding:12px;margin-top:14px;font-size:14px;display:none}
    .message.error{background:rgba(211,47,47,.06);color:var(--error);border:1px solid rgba(211,47,47,.2);display:block}
    .message.success{background:rgba(10,102,0,.06);color:var(--success);border:1px solid rgba(10,102,0,.2);display:block}
    .hidden{display:none!important}
    .footnote{margin-top:10px;text-align:center;color:#8b91a6;font-size:12px}
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="header">
        <div class="brand">
          <div class="logo"></div>
          <div class="title">Flex Facility • Checkout</div>
        </div>
        <div class="price-badge" id="amountDisplay">$0.00</div>
      </div>

      <!-- Buyer details -->
      <div class="section">
        <h3>Contact</h3>
        <div class="row">
          <div class="input">
            <label for="firstName">First name</label>
            <input id="firstName" type="text" placeholder="Jane"/>
          </div>
          <div class="input">
            <label for="lastName">Last name</label>
            <input id="lastName" type="text" placeholder="Doe"/>
          </div>
        </div>
        <div class="row">
          <div class="input" style="grid-column:1 / -1">
            <label for="email">Email (receipt)</label>
            <input id="email" type="email" placeholder="jane@example.com"/>
          </div>
        </div>
      </div>

      <!-- Address (optional, improves fraud checks) -->
      <div class="section">
        <h3>Billing address (optional)</h3>
        <div class="row">
          <div class="input" style="grid-column:1 / -1">
            <label for="address1">Address line 1</label>
            <input id="address1" type="text" placeholder="123 Main St"/>
          </div>
        </div>
        <div class="row">
          <div class="input">
            <label for="locality">City</label>
            <input id="locality" type="text" placeholder="San Francisco"/>
          </div>
          <div class="input">
            <label for="administrativeDistrictLevel1">State/Region</label>
            <input id="administrativeDistrictLevel1" type="text" placeholder="CA"/>
          </div>
        </div>
        <div class="row">
          <div class="input">
            <label for="postalCode">Postal code</label>
            <input id="postalCode" type="text" placeholder="94105"/>
          </div>
          <div class="input">
            <label for="country">Country</label>
            <input id="country" type="text" placeholder="US"/>
          </div>
        </div>
      </div>

      <!-- Wallet -->
      <div class="section">
        <h3>Wallet</h3>
        <button id="applePayBtn" class="btn secondary hidden" type="button"> Apple Pay</button>
        <div class="sub">Fast checkout if available on this device.</div>
      </div>

      <!-- Card -->
      <div class="section">
        <h3>Card</h3>
        <div id="card-container"><div class="card-placeholder">Enter your card details</div></div>
        <button id="payBtn" class="btn" type="button">
          <span id="payText">Pay Now</span>
          <div id="payLoading" class="hidden" style="width:18px;height:18px;border:2px solid transparent;border-top:2px solid #fff;border-radius:50%;animation:spin 1s linear infinite"></div>
        </button>
      </div>

      <div id="message" class="message hidden"></div>
      <div class="footnote">Secured by Square</div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const fmt = (c) => `$${(c/100).toFixed(2)}`;
    const setLoading = (v)=>{ $('payBtn').disabled=v; $('payText').classList.toggle("hidden",v); $('payLoading').classList.toggle("hidden",!v); };
    const showMsg = (t,type="error")=>{ const el=$('message'); el.textContent=t; el.className=`message ${type}`; el.style.display='block'; };
    const postToFlutter = (p)=> {
      const s = JSON.stringify(p);
      if (window.SquareBridge?.postMessage) window.SquareBridge.postMessage(s);
      else location.href = 'sqbridge://message?data=' + encodeURIComponent(s);
    };

    (async () => {
      try {
        const qs = new URLSearchParams(location.search);
        const APP_ID = qs.get("appId");
        const LOCATION_ID = qs.get("locationId");
        const AMOUNT_CENTS = Number(qs.get("amountCents") || "0");
        const API_URL = decodeURIComponent(qs.get("apiUrl") || "process-payment");
        const WALLET = qs.get("wallet");

        // Prefill buyer fields
        $('firstName').value = qs.get('firstName') || '';
        $('lastName').value  = qs.get('lastName')  || '';
        $('email').value     = qs.get('email')     || '';

        $('amountDisplay').textContent = fmt(AMOUNT_CENTS);
        if (!APP_ID || !LOCATION_ID) throw new Error("Missing appId/locationId");
        if (AMOUNT_CENTS <= 0) throw new Error("Invalid amount");
        if (!window.Square?.payments) throw new Error("Square SDK failed to load");

        const payments = window.Square.payments(APP_ID, LOCATION_ID);

        // ---------- Apple Pay ----------
        let applePayInstance;
        try {
          applePayInstance = await payments.applePay({
            countryCode: "US",
            currencyCode: "USD",
            // IMPORTANT: configure this in your Apple & Square dashboards
            merchantId: "REPLACE_WITH_YOUR_APPLE_PAY_MERCHANT_ID"
          });
          const canUse = await applePayInstance.canMakePayment();
          if (canUse) {
            const btn = $('applePayBtn');
            btn.classList.remove('hidden');
            btn.addEventListener('click', async () => {
              setLoading(true);
              try {
                const result = await applePayInstance.tokenize({
                  total: { amount: (AMOUNT_CENTS/100).toFixed(2), label: "Flex Facility" }
                });
                if (result.status !== "OK") {
                  const m = result.errors?.[0]?.message || "Apple Pay failed";
                  throw new Error(m);
                }
                await chargeServer(API_URL, {
                  token: result.token,
                  amountCents: AMOUNT_CENTS,
                  locationId: LOCATION_ID,
                  // enrich
                  referenceId: (qs.get('ref') || '').slice(0,40),
                  buyer: collectBuyer(qs)
                });
              } catch (err) {
                showMsg(err.message || "Apple Pay error","error");
                postToFlutter({ ok:false, error: err.message || String(err) });
              } finally { setLoading(false); }
            });

            // Auto-open sheet when requested
            if (WALLET === 'apple') {
              setTimeout(() => btn.click(), 120);
            }
          }
        } catch (e) {
          console.warn("Apple Pay not available:", e);
        }

        // ---------- Card ----------
        const card = await payments.card();
        await card.attach("#card-container");
        $('payBtn').addEventListener('click', async () => {
          setLoading(true); $('message').style.display='none';
          try {
            const tok = await card.tokenize();
            if (tok.status !== "OK") {
              const m = tok.errors?.[0]?.message || "Card tokenization failed";
              throw new Error(m);
            }

            // optional buyer verification
            let verificationToken;
            try {
              const vr = await payments.verifyBuyer(tok.token, {
                amount: (AMOUNT_CENTS/100).toFixed(2),
                currencyCode: "USD",
                intent: "CHARGE"
              });
              verificationToken = vr?.token;
            } catch (e) { console.warn('verifyBuyer error:', e); }

            await chargeServer(API_URL, {
              token: tok.token,
              verificationToken,
              amountCents: AMOUNT_CENTS,
              locationId: LOCATION_ID,
              referenceId: (qs.get('ref') || '').slice(0,40),
              buyer: collectBuyer(qs)
            });
          } catch (err) {
            showMsg(err.message || "Payment error","error");
            postToFlutter({ ok:false, error: err.message || String(err) });
          } finally { setLoading(false); }
        });

      } catch (err) {
        showMsg("Initialization failed: " + (err.message || err), "error");
        postToFlutter({ ok:false, error: "Initialization failed: " + (err.message || err) });
        $('payBtn').disabled = true; $('payText').textContent = "Payment Unavailable";
      }
    })();

    function collectBuyer(qs) {
      return {
        planName: qs.get('planName') || 'Training Plan',
        firstName: $('firstName').value.trim() || qs.get('firstName') || '',
        lastName: $('lastName').value.trim()  || qs.get('lastName')  || '',
        email: $('email').value.trim()        || qs.get('email')     || '',
        address: {
          addressLine1: $('address1').value.trim(),
          locality: $('locality').value.trim(),
          administrativeDistrictLevel1: $('administrativeDistrictLevel1').value.trim(),
          postalCode: $('postalCode').value.trim(),
          country: $('country').value.trim() || 'US'
        }
      };
    }

    async function chargeServer(apiUrl, payload) {
      const resp = await fetch(apiUrl, {
        method: "POST",
        headers: { "Content-Type": "application/json", "Accept": "application/json" },
        body: JSON.stringify(payload)
      });
      const data = await resp.json().catch(()=>({}));
      if (!resp.ok || !data.ok) {
        const m = data.error || data.message || `Payment failed (HTTP ${resp.status})`;
        showMsg(m,"error");
        postToFlutter({ ok:false, error:m, status:resp.status });
        return;
      }
      showMsg("Payment processed successfully!","success");
      postToFlutter({ ok:true, paymentId:data.paymentId, result:data.result });
    }
  </script>
</body>
</html>
