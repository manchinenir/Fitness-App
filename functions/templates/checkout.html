<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Square Checkout</title>
  <script>
    const params = new URLSearchParams(location.search);
    const env = (params.get("env") || "sandbox").toLowerCase();
    const squareJs = `https://${env}.web.squarecdn.com/v1/square.js`;
    document.write(`<script src="${squareJs}"><\/script>`);
  </script>
  <style>
    body{font-family:system-ui,Arial;margin:16px}
    #card{margin:16px 0}
    button{padding:12px 18px;border:0;border-radius:10px;background:#1C2D5E;color:#fff;font-weight:600}
    .err{color:#c00;background:#fee;border:1px solid #f8c;padding:10px;border-radius:8px}
  </style>
</head>
<body>
  <h3>Secure Card Payment</h3>
  <div id="card"></div>
  <button id="payBtn">Pay</button>
  <div id="msg" class="err" style="display:none"></div>

<script>
(async () => {
  const p = new URLSearchParams(location.search);
  const APP_ID      = p.get("appId");
  const ENV         = p.get("env") || "sandbox";
  const AMOUNT      = Number(p.get("amountCents") || "0");
  const LOCATION_ID = p.get("locationId");
  const API_URL     = decodeURIComponent(p.get("apiUrl") || "process-payment");

  document.getElementById("payBtn").textContent = `Pay $${(AMOUNT/100).toFixed(2)}`;

  const showErr = (t) => {
    const el = document.getElementById("msg");
    el.textContent = t; el.style.display = "block";
  };

  try {
    // IMPORTANT: pass LOCATION_ID, not ENV, to Square.payments
    const payments = window.Square.payments(APP_ID, LOCATION_ID);
    const card = await payments.card();
    await card.attach("#card");

    const postToFlutter = (payload) => {
      if (window.SquareBridge && window.SquareBridge.postMessage) {
        window.SquareBridge.postMessage(JSON.stringify(payload));
      } else {
        // Fallback custom scheme
        location.href = 'sqbridge://message?data=' + encodeURIComponent(JSON.stringify(payload));
      }
    };

    document.getElementById("payBtn").addEventListener("click", async () => {
      try {
        const { status, token } = await card.tokenize();
        if (status !== "OK") throw new Error("Tokenization failed");

        const resp = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            token,
            amountCents: AMOUNT,
            currency: "USD",
            locationId: LOCATION_ID
          })
        });

        const data = await resp.json();
        if (resp.ok && data.ok) postToFlutter({ ok: true, paymentId: data.paymentId });
        else {
          showErr(data.error || "Payment failed");
          postToFlutter({ ok: false, error: data.error || "Payment failed" });
        }
      } catch (e) {
        showErr(e.message || String(e));
        postToFlutter({ ok: false, error: e.message || String(e) });
      }
    });
  } catch (e) {
    showErr("Init failed: " + (e.message || e));
  }
})();
</script>
</body>
</html>
